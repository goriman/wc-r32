<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes">
  <title>⚽2026 W杯 決勝トーナメント</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --ink: #172033;
      --muted: #687386;
      --line: #b8c4d6;
      --line-strong: #45688f;
      --win: #0d7c66;
      --win-bg: #e4f7f1;
      --lose: #9aa5b5;
      --accent: #be123c;
      --accent-soft: #fff1f2;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      --radius: 8px;
      --match-w: 156px;
      --match-h: 76px;
      --round-gap: 38px;
      --round-top: 48px;
      --row-h: 55px;
      --side-h: 928px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 22px 28px 16px;
      border-bottom: 1px solid #dbe3ee;
      background: var(--panel);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      min-height: 38px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      font: inherit;
      font-weight: 700;
      padding: 8px 14px;
      cursor: pointer;
    }

    button:hover,
    button:focus-visible {
      border-color: var(--line-strong);
      outline: 2px solid transparent;
      background: #f8fafc;
    }

    main {
      padding: 22px 28px 34px;
      overflow-x: hidden;
    }

    .zoom-viewport {
      position: relative;
      overflow: hidden;
      height: min(72vh, 980px);
      min-height: 300px;
      border: 1px solid #d7e0ec;
      border-radius: var(--radius);
      background: #eef3f9;
      touch-action: none;
      cursor: grab;
      user-select: none;
    }

    .zoom-viewport.is-dragging {
      cursor: grabbing;
    }

    .zoom-stage {
      position: absolute;
      top: 0;
      left: 0;
      width: max-content;
      transform-origin: 0 0;
      will-change: transform;
    }

    .zoom-controls {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border: 1px solid #d7e0ec;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.18);
    }

    .zoom-controls button {
      min-width: 44px;
      min-height: 44px;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 18px;
      line-height: 1;
    }

    .zoom-controls .fit-button {
      min-width: 92px;
      font-size: 14px;
    }

    .bracket-shell {
      display: grid;
      grid-template-columns: 738px 220px 738px;
      align-items: center;
      gap: 16px;
      margin: 0 auto;
      width: max-content;
    }

    .side {
      position: relative;
      display: grid;
      grid-template-columns: repeat(4, var(--match-w));
      column-gap: var(--round-gap);
      min-height: var(--side-h);
      padding-top: var(--round-top);
    }

    .round {
      position: relative;
      display: grid;
      grid-template-rows: repeat(16, var(--row-h));
      height: calc(var(--row-h) * 16);
      min-width: 0;
    }

    .round-title {
      position: absolute;
      top: calc(var(--round-top) * -1 + 4px);
      left: 0;
      right: 0;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      background: #edf2f7;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 4px 6px;
    }

    .match-box {
      position: relative;
      background: var(--panel);
      border: 1px solid #d7e0ec;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 8px;
      width: var(--match-w);
      height: var(--match-h);
      align-self: center;
      z-index: 2;
      transition: border-color 120ms ease, background 120ms ease, opacity 120ms ease;
    }

    .match-box.is-decided {
      border-color: rgba(13, 124, 102, 0.55);
      background: #ffffff;
    }

    .match-box.is-pending {
      border-color: #d8e0eb;
      background: #f1f5f9;
      box-shadow: none;
    }

    .match-box.is-waiting {
      border-style: dashed;
      background: #f8fafc;
      box-shadow: none;
    }

    .team-row {
      display: grid;
      grid-template-columns: 18px 1fr;
      align-items: center;
      gap: 5px;
      height: 28px;
      border-radius: 6px;
      padding: 3px 5px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }

    .team-row + .team-row {
      margin-top: 5px;
      border-top: 1px solid #edf2f7;
      padding-top: 7px;
    }

    .team-row:hover {
      background: var(--panel-soft);
    }

    .team-row.empty {
      cursor: default;
      color: #8a95a6;
      background: #e9eef5;
      font-style: italic;
    }

    .team-row.winner {
      background: var(--win-bg);
      color: #064e3b;
      font-weight: 800;
    }

    .team-row.loser {
      color: var(--lose);
      opacity: 0.5;
      text-decoration: line-through;
    }

    .team-row input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--win);
      cursor: pointer;
    }

    .team-row.empty input {
      visibility: hidden;
    }

    .team-name {
      overflow-wrap: anywhere;
      font-size: 12px;
      line-height: 1.25;
    }

    .connector-line {
      position: absolute;
      background: var(--line);
      pointer-events: none;
      z-index: 1;
    }

    .connector-line.is-active {
      background: var(--win);
    }

    .connector-line.horizontal {
      height: 2px;
    }

    .connector-line.vertical {
      width: 2px;
    }

    .left .connector-line.horizontal.from {
      left: calc(var(--connector-col) * (var(--match-w) + var(--round-gap)) + var(--match-w));
      width: calc(var(--round-gap) / 2);
    }

    .left .connector-line.horizontal.to {
      left: calc((var(--connector-col) + 1) * (var(--match-w) + var(--round-gap)) - (var(--round-gap) / 2));
      width: calc(var(--round-gap) / 2);
    }

    .left .connector-line.vertical {
      left: calc((var(--connector-col) + 1) * (var(--match-w) + var(--round-gap)) - (var(--round-gap) / 2));
    }

    .right .connector-line.horizontal.from {
      right: calc(var(--connector-col) * (var(--match-w) + var(--round-gap)) + var(--match-w));
      width: calc(var(--round-gap) / 2);
    }

    .right .connector-line.horizontal.to {
      right: calc((var(--connector-col) + 1) * (var(--match-w) + var(--round-gap)) - (var(--round-gap) / 2));
      width: calc(var(--round-gap) / 2);
    }

    .right .connector-line.vertical {
      right: calc((var(--connector-col) + 1) * (var(--match-w) + var(--round-gap)) - (var(--round-gap) / 2));
    }

    .final-zone {
      align-self: stretch;
      position: relative;
      min-height: var(--side-h);
    }

    .final-label {
      position: absolute;
      top: 4px;
      left: 0;
      width: 100%;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 5px 6px;
      background: rgba(245, 247, 251, 0.9);
    }

    .final-card {
      position: absolute;
      top: 437px;
      left: 0;
      width: 100%;
      background: var(--panel);
      border: 2px solid var(--line-strong);
      border-radius: var(--radius);
      box-shadow: 0 14px 34px rgba(15, 23, 42, 0.12);
      padding: 12px;
    }

    .final-card::before,
    .final-card::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 16px;
      height: 2px;
      background: var(--line-strong);
    }

    .final-card::before {
      left: -18px;
    }

    .final-card::after {
      right: -18px;
    }

    .champion {
      position: absolute;
      top: 570px;
      left: 0;
      width: 100%;
      border: 1px solid #fecdd3;
      background: var(--accent-soft);
      border-radius: var(--radius);
      padding: 12px;
      text-align: center;
    }

    .champion-label {
      display: block;
      color: var(--accent);
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .champion-name {
      display: block;
      min-height: 24px;
      font-size: 18px;
      font-weight: 900;
    }

    .possibilities {
      margin-top: 24px;
      background: var(--panel);
      border: 1px solid #d7e0ec;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .possibilities h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .possibility-meta {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .combo-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .combo-list li {
      border: 1px solid #cbd5e1;
      border-radius: 999px;
      background: #f8fafc;
      padding: 5px 10px;
      font-weight: 800;
      font-size: 13px;
    }

    .combo-odds {
      color: #475569;
      font-weight: 900;
      margin-left: 6px;
    }

    @media (max-width: 1750px) {
      .bracket-shell {
        min-width: 1696px;
      }
    }

    @media (max-width: 767px) {
      header {
        align-items: flex-start;
        flex-direction: column;
        gap: 12px;
        padding: 16px;
      }

      h1 {
        font-size: 20px;
        line-height: 1.25;
      }

      .toolbar {
        width: 100%;
        justify-content: flex-start;
      }

      button {
        min-height: 44px;
        padding: 10px 12px;
        font-size: 14px;
      }

      main {
        padding: 12px;
      }

      .possibilities {
        margin-top: 16px;
        padding: 14px;
      }

      .possibilities h2 {
        font-size: 17px;
      }

      .combo-list {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .combo-list li {
        min-height: 44px;
        display: flex;
        align-items: center;
        border-radius: 8px;
        padding: 8px 12px;
        font-size: 15px;
      }

      .zoom-viewport {
        height: 58vh;
        min-height: 260px;
      }

      .zoom-controls {
        right: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>2026 W杯 決勝トーナメント</h1>
    <div class="toolbar" aria-label="操作">
      <button type="button" id="resetInitial">初期状態に戻す</button>
      <button type="button" id="clearAll">すべて未選択</button>
    </div>
  </header>

      return team ? `${team.name}（${team.slotNumber}）` : "未定";
    }

    function normalizeSlotPair(slotA, slotB) {
      const first = Math.min(slotA, slotB);
      const second = Math.max(slotA, slotB);
      return `${first}-${second}`;
    }

    function formatOddsAmount(value) {
      if (value === null) {
        return "払戻";
      }

      if (value >= 1000) {
        const shortened = value / 1000;
        return `${Number.isInteger(shortened) ? shortened : shortened.toFixed(1).replace(/\.0$/, "")}k`;
      }

      return String(value);
    }

    function formatOddsValue(value) {
      return value === null ? "払戻" : formatOddsAmount(value);
    }

    function getCurrentTournamentSlots() {
      return new Set(
        matches
          .filter((match) => match.sourceIds)
          .flatMap((match) => match.sourceIds)
          .map((teamId) => teams[teamId].slotNumber)
      );
    }

    function isCurrentTournamentSlot(slotNumber) {
      return currentTournamentSlots.has(slotNumber);
    }

    function getOddsForSlotPair(slotA, slotB) {
      if (!isCurrentTournamentSlot(slotA) || !isCurrentTournamentSlot(slotB)) {
        return undefined;
      }

      return oddsBySlotPair[normalizeSlotPair(slotA, slotB)];
    }

    function formatSlotPairOddsLabel(slotA, slotB) {
      const odds = getOddsForSlotPair(slotA, slotB);
      if (odds === undefined) {
        return "";
      }

      return formatOddsValue(odds);
    }

    function getSlots(match) {
      if (match.sourceIds) {
        return match.sourceIds.map((id) => teams[id]);
      }

      return match.sourceMatchIds.map((id) => {
        const winnerId = state.get(id);
        return winnerId ? teams[winnerId] : null;
      });
    }

    function findDependentMatches(matchId) {
      return matches.filter((match) => match.sourceMatchIds && match.sourceMatchIds.includes(matchId));
    }

    function clearInvalidDownstream(matchId) {
      for (const dependent of findDependentMatches(matchId)) {
        const slots = getSlots(dependent);
        const selected = state.get(dependent.id);
        const stillAvailable = selected && slots.some((team) => team && team.id === selected);

        if (!stillAvailable && selected) {
          state.set(dependent.id, null);
        }

        clearInvalidDownstream(dependent.id);
      }
    }

    function setWinner(matchId, teamId) {
      const current = state.get(matchId);
      state.set(matchId, current === teamId ? null : teamId);
      clearInvalidDownstream(matchId);
      render();
    }

    function resetInitial() {
      for (const match of matches) {
        state.set(match.id, match.initialWinnerId || null);
      }
      render();
    }

    function clearAll() {
      for (const match of matches) {
        state.set(match.id, null);
      }
      render();
    }

    function gridRowFor(match) {
      const roundMatches = matches.filter((item) => item.side === match.side && item.round === match.round);
      const index = roundMatches.findIndex((item) => item.id === match.id);
      const layout = roundLayout[match.round];
      return `${layout.starts[index]} / span ${layout.span}`;
    }

    function centerY(match) {
      const roundMatches = matches.filter((item) => item.side === match.side && item.round === match.round);
      const index = roundMatches.findIndex((item) => item.id === match.id);
      const layout = roundLayout[match.round];
      return sideTop + ((layout.starts[index] - 1) * rowSize) + (layout.span * rowSize / 2);
    }

    function matchStatus(match, slots, winnerId) {
      if (winnerId) {
        return "is-decided";
      }

      if (slots.some((team) => !team)) {
        return "is-waiting";
      }

      return "is-pending";
    }

    function renderMatch(match) {
      const slots = getSlots(match);
      const winnerId = state.get(match.id);
      const article = document.createElement("article");
      article.className = [
        "match-box",
        match.side === "left" ? "left-state" : match.side === "right" ? "right-state" : "center-state",
        matchStatus(match, slots, winnerId)
      ].join(" ");
      article.dataset.matchId = match.id;
      if (match.round !== "final") {
        article.style.gridRow = gridRowFor(match);
      }

      slots.forEach((team) => {
        const row = document.createElement("label");
        const selected = team && winnerId === team.id;
        const decidedLoser = team && winnerId && winnerId !== team.id;
        row.className = [
          "team-row",
          team ? "" : "empty",
          selected ? "winner" : "",
          decidedLoser ? "loser" : ""
        ].filter(Boolean).join(" ");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = Boolean(selected);
        checkbox.disabled = !team;
        checkbox.setAttribute("aria-label", team ? `${formatTeam(team)} 勝利` : "未定");

        checkbox.addEventListener("change", (event) => {
          event.preventDefault();
          if (team) {
            setWinner(match.id, team.id);
          }
        });

        const name = document.createElement("span");
        name.className = "team-name";
        name.textContent = formatTeam(team);

        row.append(checkbox, name);
        article.append(row);
      });

      return article;
    }

    function connectorElement(classes, col, top, height, active) {
      const line = document.createElement("span");
      line.className = [
        "connector-line",
        ...classes,
        active ? "is-active" : ""
      ].filter(Boolean).join(" ");
      line.style.setProperty("--connector-col", col);
      line.style.top = `${top}px`;
      if (height) {
        line.style.height = `${height}px`;
      }
      return line;
    }

    function renderConnectors(sideName, mount) {
      const bridgeRounds = ["r1", "r2", "r3"];

      bridgeRounds.forEach((roundKey, roundIndex) => {
        const sourceMatches = matches.filter((match) => match.side === sideName && match.round === roundKey);
        const targetRound = rounds[roundIndex + 1].key;
        const targetMatches = matches.filter((match) => match.side === sideName && match.round === targetRound);

        for (let index = 0; index < targetMatches.length; index += 1) {
          const upper = sourceMatches[index * 2];
          const lower = sourceMatches[index * 2 + 1];
          const target = targetMatches[index];
          const upperY = centerY(upper);
          const lowerY = centerY(lower);
          const targetY = centerY(target);
          const upperActive = Boolean(state.get(upper.id));
          const lowerActive = Boolean(state.get(lower.id));
          const joinedActive = upperActive && lowerActive;

          mount.append(connectorElement(["horizontal", "from"], roundIndex, upperY, 2, upperActive));
          mount.append(connectorElement(["horizontal", "from"], roundIndex, lowerY, 2, lowerActive));
          mount.append(connectorElement(["vertical"], roundIndex, upperY, lowerY - upperY, joinedActive));
          mount.append(connectorElement(["horizontal", "to"], roundIndex, targetY, 2, joinedActive));
        }
      });
    }

    function renderSide(sideName, mountId) {
      const mount = document.getElementById(mountId);
      mount.innerHTML = "";
      const visibleRounds = sideName === "right" ? [...rounds].reverse() : rounds;

      visibleRounds.forEach((round) => {
        const roundEl = document.createElement("section");
        roundEl.className = "round";
        roundEl.setAttribute("aria-label", round.label);

        const title = document.createElement("div");
        title.className = "round-title";
        title.textContent = round.label;
        roundEl.append(title);

        matches
          .filter((match) => match.side === sideName && match.round === round.key)
          .forEach((match) => roundEl.append(renderMatch(match)));

        mount.append(roundEl);
      });

      renderConnectors(sideName, mount);
    }

    function renderFinal() {
      const finalMount = document.getElementById("finalMatch");
      finalMount.innerHTML = "";
      finalMount.append(renderMatch(matchById.get("FINAL")));

      const championId = state.get("FINAL");
      document.getElementById("championName").textContent = championId ? formatTeam(teams[championId]) : "未定";
    }

    function possibleWinners(matchId) {
      const match = matchById.get(matchId);
      const selected = state.get(matchId);

      if (selected) {
        return [selected];
      }

      if (match.sourceIds) {
        return match.sourceIds;
      }

      const ids = match.sourceMatchIds.flatMap((id) => possibleWinners(id));
      return [...new Set(ids)];
    }

    function renderPossibilities() {
      const leftIds = possibleWinners("L-r4-1")
        .filter((teamId) => isCurrentTournamentSlot(teams[teamId].slotNumber));
      const rightIds = possibleWinners("R-r4-1")
        .filter((teamId) => isCurrentTournamentSlot(teams[teamId].slotNumber));
      const combos = new Set();

      for (const leftId of leftIds) {
        for (const rightId of rightIds) {
          const leftSlot = teams[leftId].slotNumber;
          const rightSlot = teams[rightId].slotNumber;
          combos.add(`${leftSlot}|${rightSlot}`);
        }
      }

      const comboList = document.getElementById("comboList");
      comboList.innerHTML = "";

      [...combos]
        .sort((a, b) => a.localeCompare(b, "ja", { numeric: true }))
        .forEach((combo) => {
          const [leftSlot, rightSlot] = combo.split("|").map(Number);
          const oddsText = formatSlotPairOddsLabel(leftSlot, rightSlot);
          const item = document.createElement("li");
          item.textContent = `（${leftSlot}）vs（${rightSlot}）`;

          if (oddsText) {
            const odds = document.createElement("span");
            odds.className = "combo-odds";
            odds.textContent = oddsText;
            odds.title = `組み合わせオッズ: ${normalizeSlotPair(leftSlot, rightSlot)} ${oddsText}`;
            item.append(odds);
          }

          comboList.append(item);
        });

      document.getElementById("possibilityMeta").textContent =
        `${combos.size}通り。未選択の試合は両チームの勝ち上がり可能性として計算しています。`;
    }

    const zoom = {
      scale: 1,
      x: 0,
      y: 0,
      min: 0.15,
      max: 2,
      fitScale: 1,
      dragging: false,
      dragStartX: 0,
      dragStartY: 0,
      startX: 0,
      startY: 0,
      pinchStartDistance: 0,
      pinchStartScale: 1,
      pinchCenter: null,
      lastTapTime: 0,
      lastTapX: 0,
      lastTapY: 0
    };

    const zoomViewport = document.getElementById("zoomViewport");
    const zoomStage = document.getElementById("zoomStage");

    function isInteractiveTarget(target) {
      return Boolean(target.closest("input, button, .zoom-controls"));
    }

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function clampZoomPosition() {
      const shell = document.querySelector(".bracket-shell");
      const viewportRect = zoomViewport.getBoundingClientRect();
      const contentWidth = shell.offsetWidth * zoom.scale;
      const contentHeight = shell.offsetHeight * zoom.scale;
      const margin = Math.min(180, Math.max(80, viewportRect.height * 0.35));

      if (contentWidth <= viewportRect.width) {
        zoom.x = (viewportRect.width - contentWidth) / 2;
      } else {
        zoom.x = clamp(zoom.x, viewportRect.width - contentWidth - margin, margin);
      }

      if (contentHeight <= viewportRect.height) {
        zoom.y = (viewportRect.height - contentHeight) / 2;
      } else {
        zoom.y = clamp(zoom.y, viewportRect.height - contentHeight - margin, margin);
      }
    }

    function applyZoom() {
      clampZoomPosition();
      zoomStage.style.transform = `translate(${zoom.x}px, ${zoom.y}px) scale(${zoom.scale})`;
    }

    function setZoomAt(nextScale, clientX, clientY) {
      const viewportRect = zoomViewport.getBoundingClientRect();
      const focalX = clientX - viewportRect.left;
      const focalY = clientY - viewportRect.top;
      const stageX = (focalX - zoom.x) / zoom.scale;
      const stageY = (focalY - zoom.y) / zoom.scale;

      zoom.scale = clamp(nextScale, zoom.min, zoom.max);
      zoom.x = focalX - stageX * zoom.scale;
      zoom.y = focalY - stageY * zoom.scale;
      applyZoom();
    }

    function resetZoomToFit() {
      const shell = document.querySelector(".bracket-shell");
      const viewportRect = zoomViewport.getBoundingClientRect();
      const scaleX = viewportRect.width / shell.offsetWidth;
      const scaleY = viewportRect.height / shell.offsetHeight;
      zoom.fitScale = clamp(Math.min(1, scaleX, scaleY) * 0.96, zoom.min, zoom.max);
      zoom.scale = zoom.fitScale;
      zoom.x = (viewportRect.width - shell.offsetWidth * zoom.scale) / 2;
      zoom.y = (viewportRect.height - shell.offsetHeight * zoom.scale) / 2;
      applyZoom();
    }

    function distanceBetweenTouches(touches) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.hypot(dx, dy);
    }

    function centerBetweenTouches(touches) {
      return {
        x: (touches[0].clientX + touches[1].clientX) / 2,
        y: (touches[0].clientY + touches[1].clientY) / 2
      };
    }

    function toggleDoubleTapZoom(clientX, clientY) {
      const targetScale = zoom.scale < 0.85 ? 1 : zoom.fitScale;
      setZoomAt(targetScale, clientX, clientY);
    }

    function initZoomViewer() {
      resetZoomToFit();

      zoomViewport.addEventListener("touchstart", (event) => {
        if (isInteractiveTarget(event.target)) {
          return;
        }

        if (event.touches.length === 1) {
          zoom.dragging = true;
          zoomViewport.classList.add("is-dragging");
          zoom.dragStartX = event.touches[0].clientX;
          zoom.dragStartY = event.touches[0].clientY;
          zoom.startX = zoom.x;
          zoom.startY = zoom.y;
        } else if (event.touches.length === 2) {
          zoom.dragging = false;
          zoom.pinchStartDistance = distanceBetweenTouches(event.touches);
          zoom.pinchStartScale = zoom.scale;
          zoom.pinchCenter = centerBetweenTouches(event.touches);
        }
      }, { passive: false });

      zoomViewport.addEventListener("touchmove", (event) => {
        if (isInteractiveTarget(event.target)) {
          return;
        }

        event.preventDefault();

        if (event.touches.length === 1 && zoom.dragging) {
          zoom.x = zoom.startX + event.touches[0].clientX - zoom.dragStartX;
          zoom.y = zoom.startY + event.touches[0].clientY - zoom.dragStartY;
          applyZoom();
        } else if (event.touches.length === 2) {
          const center = centerBetweenTouches(event.touches);
          const ratio = distanceBetweenTouches(event.touches) / zoom.pinchStartDistance;
          setZoomAt(zoom.pinchStartScale * ratio, center.x, center.y);
        }
      }, { passive: false });

      zoomViewport.addEventListener("touchend", (event) => {
        if (isInteractiveTarget(event.target)) {
          return;
        }

        zoomViewport.classList.remove("is-dragging");

        if (event.changedTouches.length === 1) {
          const touch = event.changedTouches[0];
          const now = Date.now();
          const moved = Math.hypot(touch.clientX - zoom.dragStartX, touch.clientY - zoom.dragStartY);
          const nearLastTap = Math.hypot(touch.clientX - zoom.lastTapX, touch.clientY - zoom.lastTapY) < 28;

          if (moved < 10 && now - zoom.lastTapTime < 320 && nearLastTap) {
            toggleDoubleTapZoom(touch.clientX, touch.clientY);
            zoom.lastTapTime = 0;
          } else if (moved < 10) {
            zoom.lastTapTime = now;
            zoom.lastTapX = touch.clientX;
            zoom.lastTapY = touch.clientY;
          }
        }

        zoom.dragging = false;
      }, { passive: true });

      zoomViewport.addEventListener("wheel", (event) => {
        event.preventDefault();
        const factor = event.deltaY < 0 ? 1.12 : 0.88;
        setZoomAt(zoom.scale * factor, event.clientX, event.clientY);
      }, { passive: false });

      zoomViewport.addEventListener("mousedown", (event) => {
        if (event.button !== 0 || isInteractiveTarget(event.target)) {
          return;
        }

        zoom.dragging = true;
        zoomViewport.classList.add("is-dragging");
        zoom.dragStartX = event.clientX;
        zoom.dragStartY = event.clientY;
        zoom.startX = zoom.x;
        zoom.startY = zoom.y;
      });

      window.addEventListener("mousemove", (event) => {
        if (!zoom.dragging) {
          return;
        }

        zoom.x = zoom.startX + event.clientX - zoom.dragStartX;
        zoom.y = zoom.startY + event.clientY - zoom.dragStartY;
        applyZoom();
      });

      window.addEventListener("mouseup", () => {
        zoom.dragging = false;
        zoomViewport.classList.remove("is-dragging");
      });

      zoomViewport.addEventListener("dblclick", (event) => {
        if (!isInteractiveTarget(event.target)) {
          toggleDoubleTapZoom(event.clientX, event.clientY);
        }
      });

      document.getElementById("zoomIn").addEventListener("click", () => {
        const rect = zoomViewport.getBoundingClientRect();
        setZoomAt(zoom.scale * 1.2, rect.left + rect.width / 2, rect.top + rect.height / 2);
      });

      document.getElementById("zoomOut").addEventListener("click", () => {
        const rect = zoomViewport.getBoundingClientRect();
        setZoomAt(zoom.scale / 1.2, rect.left + rect.width / 2, rect.top + rect.height / 2);
      });

      document.getElementById("zoomFit").addEventListener("click", resetZoomToFit);
      window.addEventListener("resize", resetZoomToFit);
    }

    function render() {
      renderSide("left", "leftBracket");
      renderSide("right", "rightBracket");
      renderFinal();
      renderPossibilities();
    }

    document.getElementById("resetInitial").addEventListener("click", resetInitial);
    document.getElementById("clearAll").addEventListener("click", clearAll);

    render();
    initZoomViewer();
  </script>
</body>
</html>
